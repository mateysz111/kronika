<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive Viewer PRO</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #111;
        font-family: Arial;
        color: white;
        overflow: hidden;
      }

      /* TOP BAR */
      .bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;

        height: 56px;
        background: #000;
        border-bottom: 1px solid #222;

        display: flex;
        align-items: center;
        gap: 10px;

        padding: 0 15px;
        z-index: 100;
      }

      button,
      select,
      input {
        background: #1c1c1c;
        border: 1px solid #333;
        color: white;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #2a2a2a;
      }

      #zoom {
        width: 160px;
      }

      /* LAYOUT */
      .container {
        display: flex;
        height: calc(100vh - 56px);
        margin-top: 56px;
        overflow: hidden;
      }

      /* THUMBS PANEL */
      .thumbs {
        width: 260px;
        background: #0b0b0b;
        padding: 10px;

        overflow-y: auto;
        overflow-x: hidden;

        display: flex;
        flex-wrap: wrap;
        gap: 8px;

        align-content: flex-start;

        border-right: 1px solid #1f1f1f;

        transform: translateX(0);
        transition: transform 0.22s ease;
        will-change: transform;

        flex-shrink: 0;

        /* scrollbar hidden default */
        scrollbar-width: none; /* Firefox */
      }

      /* HIDE PANEL */
      .thumbs.hidden {
        transform: translateX(-100%);
      }

      /* CHROME HIDE SCROLLBAR DEFAULT */
      .thumbs::-webkit-scrollbar {
        width: 0px;
      }

      /* SHOW SCROLLBAR ON HOVER */
      .thumbs:hover {
        scrollbar-width: thin;
        scrollbar-color: #444 #0b0b0b;
      }

      .thumbs:hover::-webkit-scrollbar {
        width: 8px;
      }

      .thumbs:hover::-webkit-scrollbar-track {
        background: #0b0b0b;
      }

      .thumbs:hover::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 10px;
        border: 2px solid #0b0b0b;
      }

      .thumbs:hover::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      /* THUMB */
      .thumb {
        width: 110px;
        aspect-ratio: 3 / 2;

        border: 2px solid transparent;
        border-radius: 4px;

        overflow: hidden;

        cursor: pointer;
        opacity: 0.6;

        transition: 0.15s;

        background: #0f0f0f;

        display: flex;
        align-items: center;
        justify-content: center;
      }
      

      .thumb.active {
        border-color: white;
        opacity: 1;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* VIEWER */
      .viewer {
        flex: 1;
        position: relative;
        background: #151515;
        overflow: hidden;
        cursor: grab;
      }

      .viewer:active {
        cursor: grabbing;
      }

      /* IMAGE */
      #img {
        position: absolute;
        top: 50%;
        left: 50%;

        transform-origin: center;
        will-change: transform;

        user-select: none;
        -webkit-user-drag: none;
      }

      /* ARROWS */
      .arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);

        background: #1c1c1c;
        border: 1px solid #333;
        color: white;

        font-size: 22px;
        padding: 10px 14px;

        border-radius: 8px;
        cursor: pointer;

        z-index: 10;
      }

      .arrow.left {
        left: 10px;
      }
      .arrow.right {
        right: 10px;
      }
    </style>
  </head>

  <body>
    <div class="bar">
      <button onclick="toggleThumbs()">☰</button>

      <select id="folderSelect"></select>

      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>

      <button onclick="rotateLeft()">⟲</button>
      <button onclick="rotateRight()">⟳</button>

      <button onclick="resetView()">🔄 Reset</button>

      <input id="zoom" type="range" min="50" max="400" value="100" />

      <span id="info"></span>
    </div>

    <div class="container">
      <div class="thumbs" id="thumbs"></div>

      <div class="viewer" id="viewer">
        <button class="arrow left" onclick="prev()">◀</button>

        <img id="img" />

        <button class="arrow right" onclick="next()">▶</button>
      </div>
    </div>

    <script>
      /* STATE */
      let manifest = {};
      let pages = [];
      let index = 0;

      let zoom = 1;
      let baseScale = 1;

      let rotation = 0;

      let offsetX = 0;
      let offsetY = 0;

      let dragging = false;
      let startX, startY;

      let thumbsVisible = true;

      /* ELEMENTS */
      const img = document.getElementById("img");
      const thumbs = document.getElementById("thumbs");
      const folderSelect = document.getElementById("folderSelect");
      const zoomSlider = document.getElementById("zoom");
      const info = document.getElementById("info");
      const viewer = document.getElementById("viewer");

      /* LOAD */
      async function loadManifest() {
        const res = await fetch("data/manifest.json");
        manifest = await res.json();

        initFolders();
        loadFolder(Object.keys(manifest)[0]);
      }

      function initFolders() {
        Object.keys(manifest).forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          folderSelect.appendChild(opt);
        });
      }

      /* FOLDER */
      function loadFolder(name) {
        pages = manifest[name];
        index = 0;
        resetView();
        renderThumbs();
        render();
      }

      /* FIT */
      function fitImage() {
        const vw = viewer.clientWidth;
        const vh = viewer.clientHeight;

        const imgW = 5109;
        const imgH = 3507;

        const scaleX = vw / imgW;
        const scaleY = vh / imgH;

        baseScale = Math.min(scaleX, scaleY) * 0.95;

        updateTransform();
      }

      /* RESET */
      function resetView() {
        zoom = 1;
        rotation = 0;
        offsetX = 0;
        offsetY = 0;

        zoomSlider.value = 100;

        fitImage();
      }

      /* THUMBS */
      function renderThumbs() {
        thumbs.innerHTML = "";

        pages.forEach((src, i) => {
          const div = document.createElement("div");
          div.className = "thumb";

          const im = document.createElement("img");
          im.src = src;

          div.appendChild(im);

          div.onclick = () => {
            index = i;
            resetView();
            render();
          };

          thumbs.appendChild(div);
        });
      }
window.addEventListener("keydown", (e) => {

    // ignoruj gdy focus jest na inputach
    const tag = document.activeElement.tagName;
    if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;

    if (e.key === "ArrowRight") {
        e.preventDefault();
        next();
    }

    if (e.key === "ArrowLeft") {
        e.preventDefault();
        prev();
    }
});
      /* RENDER */
      function render() {
        img.src = pages[index];

        info.textContent = `${index + 1} / ${pages.length}`;

        document.querySelectorAll(".thumb").forEach((t, i) => {
          t.classList.toggle("active", i === index);
        });

        fitImage();

        window.focus();
      }

      /* TRANSFORM */
      function updateTransform() {
        const finalScale = baseScale * zoom;

        img.style.transform = `translate(${offsetX}px, ${offsetY}px)
         translate(-50%, -50%)
         scale(${finalScale})
         rotate(${rotation}deg)`;
      }

      /* NAV */
      function next() {
        if (index < pages.length - 1) {
          index++;
          resetView();
          render();
        }
      }

      function prev() {
        if (index > 0) {
          index--;
          resetView();
          render();
        }
      }

      /* ROTATE */
      function rotateLeft() {
        rotation -= 90;
        updateTransform();
      }

      function rotateRight() {
        rotation += 90;
        updateTransform();
      }

      /* ZOOM */
      zoomSlider.addEventListener("input", (e) => {
        zoom = e.target.value / 100;
        updateTransform();
      });

      /* POINT ZOOM */
      viewer.addEventListener(
        "wheel",
        (e) => {
          if (!e.ctrlKey) return;

          e.preventDefault();

          const prevZoom = zoom;

          const rect = img.getBoundingClientRect();

          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          zoom += e.deltaY < 0 ? 0.15 : -0.15;
          zoom = Math.min(4, Math.max(0.5, zoom));

          offsetX -= (mouseX - offsetX) * (zoom / prevZoom - 1);
          offsetY -= (mouseY - offsetY) * (zoom / prevZoom - 1);

          updateTransform();
        },
        { passive: false },
      );

      /* DRAG */
      img.addEventListener("mousedown", (e) => {
        dragging = true;
        startX = e.clientX - offsetX;
        startY = e.clientY - offsetY;
      });

      window.addEventListener("mouseup", () => (dragging = false));

      window.addEventListener("mousemove", (e) => {
        if (!dragging) return;

        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;

        updateTransform();
      });

      /* TOGGLE */
      function toggleThumbs() {
        thumbsVisible = !thumbsVisible;
        thumbs.classList.toggle("hidden", !thumbsVisible);
      }

      /* EVENTS */
      folderSelect.addEventListener("change", (e) => {
        loadFolder(e.target.value);
      });

      /* INIT */
      loadManifest();
    </script>
  </body>
</html>
